function parse(s){return new Date(s+'T00:00:00')}

function relDue(s){const n=daysFromNow(s);if(n===0)return'today';if(n>0)return'in '+n+'d';return Math.abs(n)+'d ago'}

function deleteRole(code){if(!confirm('Remove role '+code+'? Its column is dropped from every system in the matrix.'))return;state.roles=state.roles.filter(r=>r.c!==code);state.matrix.forEach(g=>g.rows.forEach(row=>{if(row.vals)delete row.vals[code];}));if(window._arole===code)window._arole=state.roles[0]&&state.roles[0].c;save();render();}

  const c={id:'c'+Math.random().toString(36).slice(2,8),first,last,name:(first+' '+last).trim(),

const TITLES={dash:['Dashboard','Live cohort — generated from real data'],pipeline:['Pipeline','Every candidate in their current phase'],tasks:['Work Queue','Each team’s to-do across the whole pipeline'],record:['Candidate','Record · requisition · All About You · checklist + access'],access:['Access Setup','Role-based provisioning from the Access Matrix'],huddle:['Onboarding Huddle','Fix live · capture · improve'],portal:['Recruit Portal','What the candidate sees'],forms:['Forms','Information-gathering forms — answers live on profiles'],sops:['SOP Library','Every procedure'],admin:['Admin · Access Matrix','Add & edit roles and access levels — future-proof']};

function renderDash(){
  const cs=state.cands;const active=cs.length;
  const need=cs.filter(attention).length;const ok=active-need;
  const avg=active?Math.round(cs.reduce((s,c)=>s+progress(c).pct,0)/active):0;
  const future=cs.filter(c=>daysFromNow(c.start)>=0).sort((a,b)=>daysFromNow(a.start)-daysFromNow(b.start))[0];
  const rows=cs.map(c=>`<tr class="rowlink" onclick="cand='${c.id}';route='record';setNav();render()"><td><div class="who">${avatar(fullName(c))}<div><b>${fullName(c)}</b><small>${c.role}</small></div></div></td><td>${trackPill(c.track)}</td><td>${currentPhase(c)}</td><td style="min-width:120px"><div class="bar" style="margin-bottom:4px"><i style="width:${progress(c).pct}%"></i></div><small style="color:var(--mut);font-size:11px">${progress(c).done}/${progress(c).total} · ${progress(c).pct}%</small></td><td>${statusPill(c)}</td></tr>`).join('');
  return `<div class="grid kpis" style="margin-bottom:18px">
    <div class="card kpi"><div class="v">${active}</div><div class="k">Active candidates</div></div>
    <div class="card kpi"><div class="v" style="color:var(--emerald)">${ok}</div><div class="k">On track</div></div>
    <div class="card kpi"><div class="v" style="color:${need?'var(--rose)':'var(--emerald)'}">${need}</div><div class="k">Need attention</div></div>
    <div class="card kpi"><div class="v">${avg}%</div><div class="k">Avg progress</div></div>
    <div class="card kpi"><div class="v">${future?relDue(future.start):'—'}</div><div class="k">Next Day 1${future?' · '+future.first:''}</div></div>
  </div>
  <div class="card pad"><h2 class="sec">Active candidates</h2><table><thead><tr><th>Candidate</th><th>Track</th><th>Phase</th><th>Progress</th><th>Status</th></tr></thead><tbody>${rows}</tbody></table></div>`;
}
function renderPipeline(){

  const body=order.map(ph=>{const inLane=c0.filter(c=>currentPhase(c)===ph);if(!inLane.length&&!['Site Visit','Offer / BI','Pre-boarding','Day 1 → 30'].includes(ph))return'';
    return `<div class="lane"><h4>${ph} <span>${inLane.length}</span></h4>${inLane.map(c=>`<div class="ccard ${c.track}" onclick="cand='${c.id}';route='record';setNav();render()"><b>${fullName(c)}</b><div class="cm">${c.role} · ${progress(c).pct}%${c.tasks.some(t=>t.blocked)?' · ⚠':''}</div></div>`).join('')||'<div style="font-size:11px;color:var(--mut);text-align:center;padding:8px">—</div>'}</div>`;}).join('');
  return `<p style="color:var(--ink2);max-width:760px;margin:0 0 16px">Every candidate sits in their <b>current phase</b> (computed from their first unfinished task). Click a card to open the record. Ops candidates flow through <b>Screen & Interview</b> instead of Site Visit.</p><div class="board">${body}</div>`;
}
const PORDER=['Site Visit','Screen & Interview','Offer / BI','Pre-boarding','Day 1 → 30','Maintenance'];
function taskChip(c,t){const cls=t.done?'p-ok':t.blocked?'p-risk':'';const sty=(t.done||t.blocked)?'':'background:#eef0f5;color:var(--ink2)';const ic=t.done?'✓ ':t.blocked?'⚠ ':'';return `<span class="pill ${cls}" style="cursor:pointer;${sty}" onclick="toggleTask('${c.id}','${t.id}')" title="${esc(fullName(c))} · due ${relDue(t.due)}${t.blocked?' · blocked':''}">${ic}${c.first}</span>`;}
function renderTasks(){ // Work Queue — each team's to-do across all candidates
  const owners=[...new Set(state.cands.flatMap(c=>c.tasks.map(t=>t.owner)))].sort();
  const sel=window._owner||'All';
  const tv=window._tview||'list';
  let all=[];state.cands.forEach(c=>c.tasks.forEach(t=>{if(sel==='All'||t.owner===sel)all.push({c,t})}));
  const openCount=all.filter(x=>!x.t.done).length;
  const phasesPresent=[...new Set(all.map(x=>x.t.phase))].sort((a,b)=>{const ia=PORDER.indexOf(a),ib=PORDER.indexOf(b);return (ia<0?99:ia)-(ib<0?99:ib)});
  const optsHtml=['All',...owners].map(o=>`<option value="${o}" ${o===sel?'selected':''}>${o==='All'?'All owners':o}</option>`).join('');
  const controls=`<div style="display:flex;align-items:center;gap:12px;margin-bottom:14px;flex-wrap:wrap"><div class="seg"><button class="${tv==='list'?'on':''}" onclick="window._tview='list';render()">▤ By owner</button><button class="${tv==='lanes'?'on':''}" onclick="window._tview='lanes';render()">⊞ Swim lanes</button></div><label style="font-size:12px;font-weight:700;color:var(--ink2)">Owner</label><select onchange="window._owner=this.value;render()" style="border:1px solid var(--line);border-radius:9px;padding:8px 12px;font:inherit">${optsHtml}</select><span style="color:var(--mut);font-size:12.5px;margin-left:auto">${openCount} open across the pipeline · click a name to toggle that person · saves instantly</span></div>`;
  if(tv==='lanes'){
    return controls+`<div class="card pad">${all.length?buildLanesGlobal(all,phasesPresent):'<div class="empty">No tasks for this owner.</div>'}</div>`;
  }
  const ownerList=sel==='All'?owners:[sel];
  const sections=ownerList.map(o=>{

    </div>
    <div class="card pad">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:4px"><h3 style="margin:0;font-size:17px">All About You</h3><span class="pill p-ok" style="margin-left:auto">Sent to new hire</span></div>
      <p style="font-size:12.5px;color:var(--ink2);margin:8px 0">Sent <b>to the new hire</b>, completed by end of Day 1. It powers the recognition engine (birthdays, gifts, "you matter" touches). Answers store on the <b>durable person record</b> — their profile — never a CRM.</p>
      <div style="font-size:11.5px;color:var(--mut);border-top:1px solid var(--line);padding-top:10px;margin-top:6px"><b>Captures:</b> preferred name · DOB (m/d) · personal contact · favorites · recognition preference · what matters most · biggest concern.</div>
      <label style="font-size:12px;font-weight:700;color:var(--ink2);margin-top:14px;display:block">Capture / preview for a candidate</label>
      <div style="display:flex;gap:9px;margin-top:6px"><select id="fcand" style="flex:1;border:1px solid var(--line);border-radius:9px;padding:9px 12px;font:inherit">${state.cands.map(c=>`<option value="${c.id}">${fullName(c)}</option>`).join('')}</select><button class="btn pri" onclick="openAbout(document.getElementById('fcand').value)">Open form</button></div>
    </div>
  </div>
  <div class="card pad" style="margin-top:18px"><h2 class="sec">Why forms live here, not on the candidate page</h2><p style="font-size:13px;color:var(--ink2);margin:0">The candidate page holds the <b>captured information</b>. The <b>forms</b> are the instruments that collect it: the <b>New Hire Request</b> is the front door that creates the candidate, and <b>All About You</b> goes out to the new hire. Keeping the forms here — and the answers on the profile — is the "collect once, reference everywhere" rule made literal.</p></div>`;
}
function renderAdmin(){
  const rolesChips=state.roles.map(r=>`<span class="pill" style="background:var(--bg);color:var(--ink2);padding-right:6px">${r.n} <b style="color:var(--mut);font-weight:700">(${r.c})</b> <span style="cursor:pointer;color:var(--mut);font-weight:800;margin-left:4px" title="rename" onclick="renameRole('${r.c}')">✎</span><span style="cursor:pointer;color:var(--rose);font-weight:800;margin-left:2px" title="remove" onclick="deleteRole('${r.c}')">✕</span></span>`).join(' ');
  const sel=window._arole&&state.roles.some(r=>r.c===window._arole)?window._arole:(state.roles[0]&&state.roles[0].c)||'';
  const role=state.roles.find(r=>r.c===sel);
  const roleSelOpts=state.roles.map(r=>`<option value="${r.c}" ${r.c===sel?'selected':''}>${r.n} (${r.c})</option>`).join('');
  const groups=state.matrix.map((g,gi)=>{
    const rows=g.rows.map((row,ri)=>{
      if(row.base)return `<div class="acc-item"><div class="an">${row.s}${row.note?`<small>${row.note}</small>`:''}</div><span class="lvl std">Standard (all)</span><span style="cursor:pointer;color:var(--rose);font-size:10px;font-weight:800;margin-left:8px" onclick="deleteSystem(${gi},${ri})">✕</span></div>`;
      return `<div class="acc-item"><div class="an">${row.s}${row.note?`<small>${row.note}</small>`:''}</div><input value="${esc(row.vals&&row.vals[sel]||'')}" onchange="setVal(${gi},${ri},'${sel}',this.value)" placeholder="— (no access)" style="width:170px;border:1px solid var(--line);border-radius:7px;padding:6px 9px;font:inherit;font-size:12px"><span style="cursor:pointer;color:var(--rose);font-size:10px;font-weight:800;margin-left:8px" onclick="deleteSystem(${gi},${ri})">✕</span></div>`;
    }).join('')||'<div class="acc-item"><span style="color:var(--mut);font-size:12px">No systems yet — add one.</span></div>';
    return `<div class="acc-grp"><div class="gh" style="background:${g.col}">${g.o}<span class="gc" style="cursor:pointer" onclick="addSystem(${gi})">+ system</span></div><div>${rows}</div></div>`;
  }).join('');
  return `<div class="card pad" style="margin-bottom:16px"><div style="display:flex;align-items:center;margin-bottom:10px"><h2 class="sec" style="margin:0">Roles</h2><button class="btn pri" style="margin-left:auto" onclick="addRole()">+ Add role</button></div><div style="display:flex;gap:8px;flex-wrap:wrap">${rolesChips}</div><p style="font-size:11.5px;color:var(--mut);margin:12px 0 0">These drive role-based provisioning on every candidate. Add a role and it appears in the candidate role picker; new roles start with no access until you set values below. Everything here persists.</p></div>
  <div class="card pad" style="margin-bottom:16px"><div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap"><h2 class="sec" style="margin:0">Edit access for role</h2><select onchange="window._arole=this.value;render()" style="border:1px solid var(--line);border-radius:9px;padding:8px 12px;font:inherit">${roleSelOpts}</select><button class="btn ghost" style="margin-left:auto" onclick="addGroup()">+ Add system group</button></div><p style="font-size:11.5px;color:var(--ink2);margin:10px 0 0">Editing <b>${role?role.n+' ('+role.c+')':'—'}</b>. Type the access level per system — e.g. <b>OrgID</b>, <b>Name only</b>, <b>All</b>, <b>Quote</b>, <b>Cert</b>, <b>Y</b>, <b>Prelim</b>, <b>CL/FN</b> — or leave blank / <b>—</b> for no access. Saves instantly.</p></div>
  ${groups}`;
}
setNav();render();
</script>
</body>
</html>
